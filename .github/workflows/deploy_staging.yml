name: Deploy Frontend to Staging

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # download code from git dor check code
      - name: Checkout code
        uses: actions/checkout@v4
      # setup nodejs
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # my version nodejs
          node-node: '24.12.0'
          cache: 'npm' # on cache. anyway we need it, altroght amount memory is limited.
      - name: Create .env Base64 secret
        run: |
          echo "${{ secrets.ENV_STAGING_BASE64 }}" | base64 --decode > .env
      # build in github
      - name: Install and Build
        run: |
          npm ci
          npm run build 
      # copy files on vps
      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: /srv/staging/dist/  # Где будет лежать на сервере
          SOURCE: dist/                  # Копируется dist из GitHub
          ARGS: "-rlgoDzvO --delete"     # Флаг --delete очистит старый код на сервере перед записью нового