name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.12.0"
          cache: "npm"

      - name: Create .env from Base64 secret
        run: |
          echo "${{ secrets.ENV_PRODUCTION_BASE64 }}" | base64 --decode > .env

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Deploy dist to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: dist/
          TARGET: /srv/production/dist/
          ARGS: "-rlgoDzvO --delete"

      - name: Deploy nginx config to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: nginx/production.conf
          TARGET: /srv/production/
          ARGS: "-rlgoDzv"
          SCRIPT_AFTER: |
            sudo certbot --nginx \
              -d min-monitoring.ru -d www.min-monitoring.ru \
              --non-interactive --agree-tos \
              --force-renewal \
              --register-unsafely-without-email --redirect || true
            sudo nginx -t && sudo systemctl reload nginx
