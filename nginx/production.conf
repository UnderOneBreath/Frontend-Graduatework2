server {
    listen 80;
    server_name min-monitoring.ru www.min-monitoring.ru;

    root /srv/production/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/min-monitoring.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/min-monitoring.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# API reverse-proxy — routes to the 4 microservices by path prefix
server {
    listen 443 ssl;
    server_name api.min-monitoring.ru;

    ssl_certificate /etc/letsencrypt/live/api.min-monitoring.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.min-monitoring.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Pass real client IP to FastAPI so CORS middleware sees the correct Origin
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # users service: /auth/*, /users/*
    location ~ ^/(auth|users)/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # lottery service: /lotteries/*, /prizes/*, /tickets/*
    location ~ ^/(lotteries|prizes|tickets)/ {
        proxy_pass http://127.0.0.1:8001;
    }

    # organizers service: /organizers/*, /requests/*
    location ~ ^/(organizers|requests)/ {
        proxy_pass http://127.0.0.1:8002;
    }

    # notifications service: /notifications/*
    location /notifications/ {
        proxy_pass http://127.0.0.1:8003;
    }
}

server {
    listen 80;
    server_name api.min-monitoring.ru;
    return 301 https://$host$request_uri;
}

server {
    if ($host = www.min-monitoring.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = min-monitoring.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name min-monitoring.ru www.min-monitoring.ru;
    return 404; # managed by Certbot
}
