server {
    listen 80;
    server_name test.min-monitoring.ru;

    root /srv/staging/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    location / {
        try_files $uri $uri/ /index.html;
    }
    
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/test.min-monitoring.ru/fullchain.pem; # managed>
    ssl_certificate_key /etc/letsencrypt/live/test.min-monitoring.ru/privkey.pem; # manag>
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = test.min-monitoring.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name test.min-monitoring.ru;
    return 404; # managed by Certbot


}
